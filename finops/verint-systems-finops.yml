principles:
  - name: Visibility
    description: Verint exposes consumption telemetry inside the platform UI; no public usage/cost API
      is documented. Track license utilization through the customer success engagement.
  - name: Allocation
    description: Allocation is contract-level (per Verint product, seat / channel scoping in the order
      form).
  - name: Optimization
    description: 'Optimization is scope-driven: which channels and modules are licensed, agent / seat
      counts. Renewal is the primary optimization checkpoint.'
  - name: Accountability
    description: Accountability sits with the contact-center / WEM platform owner; finance owns the
      annual subscription line.
